<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script>
// MOVE ALL FUNCTIONS TO TOP BEFORE ANYTHING USES THEM
function get_cookie(cookie_name) { 
    const value = "; " + document.cookie; 
    const parts = value.split("; " + cookie_name + "="); 
    if (parts.length === 2) return parts.pop().split(";").shift(); 
    return null;
}

function blank(){
    if (window.top !== window) {
        var url = document.URL; 
        var urlObj = new window.URL(window.location.href); 
        var win = window.open(); 
        if (win) {
            win.document.body.style.margin = "0"; 
            win.document.body.style.height = "100vh";
            var iframe = win.document.createElement('iframe');
            iframe.src = url;
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            win.document.body.appendChild(iframe);
        }
    }
}
</script>

<script src="/uv/uv.bundle.js" defer></script>
<script src="/uv/uv.config.js" defer></script>
<script src="/register-sw.js" defer></script>
<script src="/search.js" defer></script>

<div id="black" class="black"></div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
    var link=document.querySelector("link[rel*='icon']") || document.createElement('link');
    link.type='image/x-icon';
    link.rel='shortcut icon';
    link.href="https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://google.com&size=16";
    document.title="Google";
    document.getElementsByTagName('head')[0].appendChild(link);
</script>

<form class="searchbox" id="searchbox">
    <input id="searchengine" type="hidden"/>
    <input style="color: #FFF;" class="search" id="search" placeholder='Search the web freely' type='text'/>
    <center>
        <button type="submit" style="border-radius: 10px 10px 10px 10px; padding: 15px 90px;">Surf the web</button>
        <button id="butdon" style="color: #000; border-radius: 10px 10px 10px 10px; padding: 15px 30px;">Google</button>
        <script>
        document.getElementById("butdon").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("search").value = 'https://www.google.com/search?q=';
        });
        </script>
        <br>
    </center>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('query');
        
        if (queryParam) {
            function decodeBase64(base64) {
                return decodeURIComponent(escape(window.atob(base64)));
            }
            var decodedString = decodeBase64(queryParam);
            document.getElementById('search').value = decodedString;
        }
    });
    </script>
</form>

<style>
    @import url("https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap");
    
    body { margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; }
    
    .black{
        position:absolute;
        left:0px;
        opacity:1;
        display:block;
        top:0px;
        width:100%;
        z-index:100;
        height:100%;
        background: #000;
    }
    
    .searchbox{
        width:47%;
        height:7%;
        color: #FFFFFF;
        position: absolute;
        left:26.5%;
        top:50%;
    }
    
    .search{
        text-align: center;
        border-radius: 18px;
        outline:none;
        background:#446880;
        border: 2px solid #FFF;
        color: #FFF;
        width:100%;
        height:100%;
        font-size: 16px;
    }
    
    button {

        font-size: 14px;

    button:hover {

    }
</style>

<script>
    // NOW SAFE TO USE get_cookie
    var title2 = get_cookie("title2");
    var favicon = get_cookie("favicon");
    
    if (favicon==null || favicon==undefined || favicon==""){
        favicon="/img/logo.png";
        document.cookie="favicon="+favicon+"; expires=Thu, 18 Dec 9013 12:00:00 UTC; path=/";
    }
    
    if (title2==null || title2==undefined || title2==""){
        title2="Google";
        document.cookie="title2="+title2+"; expires=Thu, 18 Dec 9013 12:00:00 UTC; path=/";
        document.title=title2;
    }
    else{
        document.title=title2;
    }
</script>

<script>
    window.navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
    
    var browsertype = get_cookie("browser3");
    
    if (browsertype==null || browsertype==undefined || browsertype==""){
        browsertype="google";
        document.getElementById("searchengine").value="https://www.google.com/search?q=%s";
        document.cookie="browser3="+browsertype+"; expires=Thu, 18 Dec 9013 12:00:00 UTC; path=/";
    }
    else{
        if (browsertype=="google"){
            document.getElementById("searchengine").value="https://www.google.com/search?q=%s";
        }
        if (browsertype=="bing"){
            document.getElementById("searchengine").value="https://www.bing.com/search?q=%s";
        }
        if (browsertype=="yahoo"){
            document.getElementById("searchengine").value="https://search.yahoo.com/search?p=%s";
        }
    }
</script>

<script>
function isUrl(val = '') {
    if (/^http(s?):\/\//.test(val) || val.includes('.') && val.substr(0, 1) !== ' ') return true;
    return false;
}

document.getElementById("searchbox").addEventListener("submit", function(e) {
    e.preventDefault();
    var searchInput = document.getElementById("search").value;
    var searchEngine = document.getElementById("searchengine").value;
    
    if (!searchInput) return;
    
    var url = search(searchInput, searchEngine);
    if (url) {
        window.location.href = url;
    }
});

function fade(){
    var blackElement = document.getElementById("black");
    if (blackElement) {
        blackElement.remove();
    }
}
setTimeout(fade, 100);
</script>
